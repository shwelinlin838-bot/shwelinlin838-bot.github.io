<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Pi App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f0f7;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 90%;
        }
        h1 { color: #5b2c6f; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; }
        button {
            background-color: #e2b13c;
            color: #4a235a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #d4a32c; }
        #user-info { margin-top: 25px; font-weight: bold; color: #196f3d; }
        
        #debug-box {
            margin-top: 25px;
            padding: 12px;
            background: #fdf2f2;
            border: 1px solid #f5b0b0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #c0392b;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My First Pi App</h1>
        <p>အန်ကယ့်ရဲ့ ပထမဆုံး Pi App လေးကို အောင်မြင်စွာ စတင်လိုက်ပါပြီ။</p>
        <button id="login-btn" onclick="loginWithPi()">Login with Pi</button>
        <p id="user-info"></p>
        
        <h4 style="margin-top: 25px; color: #666; margin-bottom: 5px;">စနစ်စစ်ဆေးချက် (Debug Logs) -</h4>
        <div id="debug-box">စနစ်စတင်ပတ်နေသည်...</div>
    </div>

    <!-- ၁။ လုပ်ဆောင်မည့် Function များကို အရင်ဆုံး ကြေညာပေးထားရပါမည် -->
    <script>
        let sdkReady = false;

        function writeLog(message) {
            const box = document.getElementById("debug-box");
            if (box) {
                box.innerHTML += "<br>• " + message;
            }
        }

        // SDK ဖိုင် ဆွဲယူပြီးမှ Pi.init ကို စတင်ခေါ်ယူမည့် လုပ်ဆောင်ချက်
        function sdkLoaded() {
            writeLog("Pi SDK ဖိုင် ဆွဲယူခြင်း (Load) အောင်မြင်ပါပြီ။");
            try {
                writeLog("Pi.init လုပ်ဆောင်နေပါသည်...");
                Pi.init({ version: "2.0", sandbox: true });
                sdkReady = true;
                writeLog("Pi.init အောင်မြင်စွာ စတင်ပြီးပါပြီ။");
            } catch (e) {
                writeLog("Pi.init လုပ်ရာတွင် Error တက်သွားသည်: " + e.message);
            }
        }

        // SDK ဆွဲမရလျှင် ပြသမည့် လုပ်ဆောင်ချက်
        function sdkFailed() {
            writeLog("Error: Pi SDK ဖိုင်ကို ဆွဲယူ (Load) မရပါ။");
        }

        async function loginWithPi() {
            if (!sdkReady) {
                writeLog("သတိပေးချက်: Pi SDK အဆင်မသင့်ဖြစ်သေးပါ။ ခဏစောင့်ပြီး ပြန်နှိပ်ပေးပါ။");
                alert("SDK အဆင်မသင့်ဖြစ်သေးပါ။ ကျေးဇူးပြု၍ ခဏစောင့်ပေးပါ။");
                return;
            }

            writeLog("Login ခလုတ်နှိပ်ခြင်းကို လက်ခံရရှိပါပြီ။ Authenticate လုပ်နေပါသည်...");
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    writeLog("မပြီးပြတ်သေးသော ငွေပေးချေမှု တွေ့ရှိသည်: " + JSON.stringify(payment));
                }
                
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                writeLog("Authenticate အောင်မြင်ပါသည်! User: @" + auth.user.username);
                document.getElementById("user-info").innerText = "မင်္ဂလာပါ Pi User: @" + auth.user.username;
                alert("Pi အကောင့် ချိတ်ဆက်မှု အောင်မြင်သည် - @" + auth.user.username);
            } catch (error) {
                writeLog("Authenticate Error ဖြစ်သွားသည်: " + error.message);
                alert("တစ်ခုခု မှားယွင်းနေပါသည်: " + error.message);
            }
        }
    </script>

    <!-- ၂။ အပေါ်က Function များကို ဖတ်ပြီးမှ Pi SDK ဖိုင်ကို အောက်နားကနေ စတင်ဆွဲယူပါမည် -->
    <script src="https://sdk.mine.pi/pi-sdk.js" 
            onload="sdkLoaded()" 
            onerror="sdkFailed()"></script>
    
    <script>
        // စတင်ကြောင်း Log ထုတ်ပေးခြင်း
        writeLog("Pi SDK ဖိုင်ကို စတင်ဆွဲယူနေပါသည် (Loading SDK)...");
    </script>
</body>
</html>
