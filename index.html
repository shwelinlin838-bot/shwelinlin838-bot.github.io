<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Pi App</title>
    <!-- Pi SDK -->
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f0f7;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 90%;
        }
        h1 { color: #5b2c6f; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; }
        button {
            background-color: #e2b13c;
            color: #4a235a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #d4a32c; }
        #user-info { margin-top: 25px; font-weight: bold; color: #196f3d; }
        
        /* Error နှင့် Debug ပြသရန် နေရာသစ် */
        #debug-box {
            margin-top: 25px;
            padding: 12px;
            background: #fdf2f2;
            border: 1px solid #f5b0b0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #c0392b;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My First Pi App</h1>
        <p>အန်ကယ့်ရဲ့ ပထမဆုံး Pi App လေးကို အောင်မြင်စွာ စတင်လိုက်ပါပြီ။</p>
        <button id="login-btn" onclick="loginWithPi()">Login with Pi</button>
        <p id="user-info"></p>
        
        <!-- Debug Logs ခေါင်းစဉ် -->
        <h4 style="margin-top: 25px; color: #666; margin-bottom: 5px;">စနစ်စစ်ဆေးချက် (Debug Logs) -</h4>
        <div id="debug-box">စနစ်စတင်ပတ်နေသည်...</div>
    </div>

    <script>
        // Debug စာတန်းပြသပေးမည့် စနစ်
        function writeLog(message) {
            const box = document.getElementById("debug-box");
            box.innerHTML += "<br>• " + message;
        }

        try {
            writeLog("Pi SDK ကို စတင်ချိတ်ဆက်နေပါသည်...");
            Pi.init({ version: "2.0", sandbox: true });
            writeLog("Pi SDK Initialize လုပ်ဆောင်ခြင်း အောင်မြင်ပါသည်။");
        } catch (e) {
            writeLog("Pi.init လုပ်ရာတွင် Error တက်သွားသည်: " + e.message);
        }

        async function loginWithPi() {
            writeLog("Login ခလုတ်နှိပ်ခြင်းကို လက်ခံရရှိပါပြီ။ Authenticate လုပ်နေပါသည်...");
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    writeLog("မပြီးပြတ်သေးသော ငွေပေးချေမှု တွေ့ရှိသည်: " + JSON.stringify(payment));
                }
                
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                writeLog("Authenticate အောင်မြင်ပါသည်! User: @" + auth.user.username);
                document.getElementById("user-info").innerText = "မင်္ဂလာပါ Pi User: @" + auth.user.username;
                alert("Pi အကောင့် ချိတ်ဆက်မှု အောင်မြင်သည် - @" + auth.user.username);
            } catch (error) {
                writeLog("Authenticate Error ဖြစ်သွားသည်: " + error.message);
                alert("တစ်ခုခု မှားယွင်းနေပါသည်: " + error.message);
            }
        }
    </script>
</body>
</html>
