<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Lucky Spin Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      background: linear-gradient(135deg, #2c1143 0%, #4a235a 100%);
      color: #fff; 
      min-height: 100vh;
      padding: 20px 10px;
    }
    .game-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      max-width: 420px;
      margin: 0 auto;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    h1 { color: #f1c40f; font-size: 24px; margin-bottom: 5px; }
    p.subtitle { font-size: 14px; color: #ddd; margin-bottom: 15px; }

    /* User Stats Bar */
    .user-bar {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .coins-badge {
      background: #f1c40f;
      color: #2c1143;
      padding: 5px 12px;
      border-radius: 15px;
      font-weight: bold;
    }

    /* Wheel Container */
    .wheel-container {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 20px auto;
    }
    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
    }
    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 25px solid #e74c3c;
      z-index: 10;
    }

    /* Buttons */
    .btn {
      background: linear-gradient(45deg, #f1c40f, #e67e22);
      color: #2c1143;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      margin: 8px;
      box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-login { background: linear-gradient(45deg, #3498db, #2980b9); color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }

    /* Result Popup */
    #result-modal {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #27ae60;
      color: white;
      border-radius: 10px;
      font-weight: bold;
      animation: popup 0.5s ease;
    }

    /* Logs */
    .log-box {
      margin-top: 20px;
      text-align: left;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="game-card">
    <h1>🎡 Pi Lucky Spin</h1>
    <p class="subtitle">ကံစမ်းဘီးလှည့်ပြီး Coins ရမှတ်များ စုဆောင်းပါ</p>

    <!-- User & Coins Info -->
    <div class="user-bar">
      <span id="user-display">👤 Guest</span>
      <span class="coins-badge">💰 <span id="coin-count">0</span> Coins</span>
    </div>

    <!-- Spin Wheel Canvas -->
    <div class="wheel-container">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <!-- Actions -->
    <div>
      <button class="btn btn-login" id="login-btn" onclick="loginWithPi()">Login with Pi</button>
      <button class="btn" id="spin-btn" onclick="payAndSpin()">Spin (0.1 Pi)</button>
    </div>

    <div id="result-modal"></div>

    <!-- Logs -->
    <div class="log-box" id="log-box">
      • စနစ်စတင်နေသည်...<br>
    </div>
  </div>

  <script>
    let sdkReady = false;
    let currentUser = null;
    let coins = parseInt(localStorage.getItem('pi_game_coins')) || 0;
    const API_KEY = "64qkpviopkhj8mkfn6nu00kopqttygcylsjw4yerfdsybkjbg27tfs1aourdq8cu";

    document.getElementById('coin-count').innerText = coins;

    // Wheel Setup
    const prizes = ["100 Coins", "50 Coins", "Try Again", "300 Coins", "150 Coins", "500 Coins", "200 Coins", "JACKPOT 🎉"];
    const colors = ["#f39c12", "#8e44ad", "#e74c3c", "#1abc9c", "#3498db", "#2ecc71", "#e67e22", "#9b59b6"];
    let currentAngle = 0;
    let isSpinning = false;

    function drawWheel() {
      const canvas = document.getElementById("wheelCanvas");
      const ctx = canvas.getContext("2d");
      const numSlices = prizes.length;
      const sliceAngle = (2 * Math.PI) / numSlices;

      ctx.clearRect(0, 0, 300, 300);

      for (let i = 0; i < numSlices; i++) {
        const angle = currentAngle + i * sliceAngle;
        
        // Draw Slice
        ctx.beginPath();
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 140, angle, angle + sliceAngle);
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#fff";
        ctx.stroke();

        // Draw Text
        ctx.save();
        ctx.translate(150, 150);
        ctx.rotate(angle + sliceAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.font = "bold 13px sans-serif";
        ctx.fillText(prizes[i], 125, 5);
        ctx.restore();
      }
    }

    drawWheel();

    function writeLog(msg) {
      const logBox = document.getElementById('log-box');
      if (logBox) {
        logBox.innerHTML += '• ' + msg + '<br>';
        logBox.scrollTop = logBox.scrollHeight;
      }
    }

    function sdkLoaded() {
      try {
        Pi.init({ version: "2.0", sandbox: true });
        sdkReady = true;
        writeLog('<span style="color:#2ecc71;">Pi SDK အသင့်ဖြစ်ပါပြီ။</span>');
      } catch(e) {
        writeLog('<span style="color:#e74c3c;">SDK Error: ' + e.message + '</span>');
      }
    }

    function sdkFailed() {
      writeLog('<span style="color:#e74c3c;">SDK ဖိုင် Load မရပါ။</span>');
    }

    async function loginWithPi() {
      if (!sdkReady) return alert("SDK မဆွဲယူနိုင်သေးပါ။");
      try {
        const auth = await Pi.authenticate(['username', 'payments'], payment => {
          writeLog("Incomplete payment တွေ့ရှိ: " + payment.identifier);
        });
        currentUser = auth.user;
        document.getElementById("user-display").innerText = "👤 @" + currentUser.username;
        document.getElementById("login-btn").style.display = "none";
        writeLog('<span style="color:#2ecc71;">Login အောင်မြင်သည်: @' + currentUser.username + '</span>');
      } catch (e) {
        writeLog('<span style="color:#e74c3c;">Login Error: ' + e.message + '</span>');
      }
    }

    function payAndSpin() {
      if (!sdkReady) return alert("SDK အဆင်မသင့်ဖြစ်သေးပါ");
      if (!currentUser) {
        alert("ကျေးဇူးပြု၍ အရင် Login ဝင်ပေးပါခင်ဗျာ။");
        return loginWithPi();
      }
      if (isSpinning) return;

      writeLog("ငွေပေးချေမှု စတင်နေသည်...");

      const paymentData = {
        amount: 0.1,
        memo: "Spin Wheel Ticket (0.1 Pi)",
        metadata: { game: "Pi Lucky Spin" }
      };

      const paymentCallbacks = {
        onReadyForServerApproval: async function(paymentId) {
          writeLog("Approval တောင်းဆိုနေသည်...");
          try {
            await fetch(`https://api.minepi.com/v2/payments/${paymentId}/approve`, {
              method: 'POST',
              headers: { 'Authorization': `Key ${API_KEY}` }
            });
            writeLog('<span style="color:#3498db;">Server Approved!</span>');
          } catch(e) {
            writeLog('<span style="color:#e74c3c;">Approve Error: ' + e.message + '</span>');
          }
        },
        onReadyForServerCompletion: async function(paymentId, txid) {
          writeLog("Transaction အပြီးသတ်နေသည်...");
          try {
            await fetch(`https://api.minepi.com/v2/payments/${paymentId}/complete`, {
              method: 'POST',
              headers: { 
                'Authorization': `Key ${API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ txid: txid })
            });
            writeLog('<span style="color:#2ecc71;">ငွေချေမှု အောင်မြင်ပါသည်။</span>');
            startWheelSpin(); // ငွေချေမှု အောင်မြင်မှ ဘီး စတင်လည်မည်
          } catch(e) {
            writeLog('<span style="color:#e74c3c;">Completion Error: ' + e.message + '</span>');
          }
        },
        onCancel: function(paymentId) { writeLog("Payment Cancelled"); },
        onError: function(error) { writeLog('<span style="color:#e74c3c;">Payment Error: ' + error.message + '</span>'); }
      };

      Pi.createPayment(paymentData, paymentCallbacks);
    }

    function startWheelSpin() {
      isSpinning = true;
      document.getElementById('result-modal').style.display = 'none';
      
      const winningIndex = Math.floor(Math.random() * prizes.length);
      const numSlices = prizes.length;
      const sliceAngle = (2 * Math.PI) / numSlices;
      
      // Calculate target angle (Align prize to top pointer)
      const extraRounds = 5 * 2 * Math.PI; // Spin 5 full rounds
      const targetAngle = extraRounds + (numSlices - winningIndex - 0.5) * sliceAngle;

      let start = null;
      const duration = 4000; // 4 seconds spin

      function animate(timestamp) {
        if (!start) start = timestamp;
        const progress = Math.min((timestamp - start) / duration, 1);
        
        // Ease-out rotation physics
        const easeOut = 1 - Math.pow(1 - progress, 3);
        currentAngle = easeOut * targetAngle;

        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          showReward(prizes[winningIndex]);
        }
      }

      requestAnimationFrame(animate);
    }

    function showReward(prize) {
      const modal = document.getElementById('result-modal');
      modal.style.display = 'block';
      modal.innerText = "🎉 ဂုဏ်ယူပါတယ်! သင် " + prize + " ရရှိခဲ့ပါသည်။";

      // Add coins based on prize
      if (prize.includes("100")) coins += 100;
      else if (prize.includes("50")) coins += 50;
      else if (prize.includes("150")) coins += 150;
      else if (prize.includes("200")) coins += 200;
      else if (prize.includes("300")) coins += 300;
      else if (prize.includes("500")) coins += 500;
      else if (prize.includes("JACKPOT")) coins += 1000;

      localStorage.setItem('pi_game_coins', coins);
      document.getElementById('coin-count').innerText = coins;
    }
  </script>

  <script src="https://sdk.minepi.com/pi-sdk.js" onload="sdkLoaded()" onerror="sdkFailed()"></script>
</body>
</html>
