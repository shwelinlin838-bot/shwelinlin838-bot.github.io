<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Pi App</title>
    <!-- Pi SDK ကို ဆာဗာနဲ့ ချိတ်ဆက်ပေးသောလင့်ခ် -->
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f0f7;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 90%;
        }
        h1 { color: #5b2c6f; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; }
        button {
            background-color: #e2b13c;
            color: #4a235a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #d4a32c; }
        #user-info { margin-top: 25px; font-weight: bold; color: #196f3d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My First Pi App</h1>
        <p>အန်ကယ့်ရဲ့ ပထမဆုံး Pi App လေးကို အောင်မြင်စွာ စတင်လိုက်ပါပြီ။</p>
        <button onclick="loginWithPi()">Login with Pi</button>
        <p id="user-info"></p>
    </div>

    <script>
        // Pi App ကို စမ်းသပ်မှုပုံစံ (Sandbox Mode) ဖြင့် စတင်လည်ပတ်ခြင်း
        Pi.init({ version: "2.0", sandbox: true });

        async function loginWithPi() {
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    console.log("Incomplete payment found", payment);
                }
                
                // Pi User သို့ အကောင့်ဝင်ရန် တောင်းဆိုခြင်း
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById("user-info").innerText = "မင်္ဂလာပါ Pi User: @" + auth.user.username;
                alert("Pi အကောင့် ချိတ်ဆက်မှု အောင်မြင်သည် - @" + auth.user.username);
            } catch (error) {
                console.error(error);
                alert("တစ်ခုခု မှားယွင်းနေပါသည်: " + error.message);
            }
        }
    </script>
</body>
</html>
